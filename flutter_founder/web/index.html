<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_dark_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_dark_app</title>
  <!-- Dynamically choose manifest source to work around tunnel auth on port 8080.
       If running via GitHub dev tunnel that maps ports into hostnames like
       `scaling-memory-...-8080.app.github.dev`, swap `-8080` for `-5000` to
       fetch the manifest from the backend service which serves it with CORS. -->
  <script>
    (function(){
      try {
        var host = window.location.host || '';
        var link = document.createElement('link');
        link.rel = 'manifest';
        if (host.includes('-8080')) {
          var backendHost = host.replace('-8080', '-5000');
          link.href = window.location.protocol + '//' + backendHost + '/manifest.json';
        } else {
          link.href = 'manifest.json';
        }
        document.head.appendChild(link);
      } catch (e) {
        // Fallback to default manifest reference
        var fallback = document.createElement('link');
        fallback.rel = 'manifest';
        fallback.href = 'manifest.json';
        document.head.appendChild(fallback);
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
