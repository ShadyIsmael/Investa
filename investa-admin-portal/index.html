
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investa Admin Portal</title>
    <script>
      // Use class-based dark mode so we can toggle it from JS
      window.tailwind = window.tailwind || {};
      window.tailwind.config = window.tailwind.config || {};
      window.tailwind.config.darkMode = 'class';
      window.tailwind.config.theme = {
        extend: {
          colors: {
            // Semantic colors from index.css variables
            background: 'var(--bg)',
            surface: 'var(--surface)',
            primary: {
              DEFAULT: 'var(--primary)',
              foreground: '#ffffff',
            },
            secondary: 'var(--secondary)',
            muted: 'var(--muted)',
            border: 'var(--border)',
            text: 'var(--text)',
           success: '#10b981', // emerald-500
           warning: '#f59e0b', // amber-500
           error: '#ef4444',   // red-500
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          fontSize: {
            xxs: '0.625rem', // 10px
          }
        }
      };
    </script>

    <!-- Runtime API base override: set meta tag <meta name="investa-api-base" content="http://desktop-dih7cqh:5235" /> -->
    <script>
      (function(){
        try {
          var meta = document.querySelector('meta[name="investa-api-base"]');
          var override = meta && meta.getAttribute('content');
          if (override) {
            window.__INVESTA_API_BASE = override;
            console.info('[Investa Admin] API base overridden from meta:', override);
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar for nicer aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
