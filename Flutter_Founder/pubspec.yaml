name: flutter_founder
description: A minimal Flutter app demonstrating dark mode with toggle.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ">=3.0.0 <4.0.0" # رفعنا الـ SDK عشان يدعم النسخ الجديدة

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  google_fonts: ^4.0.3
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2 
  google_sign_in: ^6.2.1 
  # flutter_facebook_auth: ^6.0.4 # Temporarily disabled - macOS plugin issue
  flutter_signin_button: ^2.0.0
  http: ^0.13.6
  flutter_secure_storage: ^9.2.2 
  jwt_decoder: ^2.0.1
  dio: ^5.7.0 
  fl_chart: ^0.70.0 # تحديث بسيط للثبات
  path_provider: ^2.1.5
  provider: ^6.0.5
  # التحديثات الجوهرية لفايربيز هنا:
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  cloud_firestore: ^5.6.1
  firebase_auth: ^5.4.1
  # Clean Architecture Dependencies
  get_it: ^7.6.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  logger: ^2.0.2
  flutter_local_notifications: ^17.0.0  # Updated to fix bigLargeIcon compilation error
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^22.7.4
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
    - .env

dependency_overrides:
  vector_math: ^2.1.4 