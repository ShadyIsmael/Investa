name: flutter_founder
description: A minimal Flutter app demonstrating dark mode with toggle.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ">=3.0.0 <4.0.0" # رفعنا الـ SDK عشان يدعم النسخ الجديدة

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  google_fonts: ^6.3.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2 
  google_sign_in: ^7.1.1 
  # flutter_facebook_auth: ^6.0.4 # Temporarily disabled - macOS plugin issue
  flutter_signin_button: ^2.0.0
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0 
  jwt_decoder: ^2.0.1
  dio: ^5.7.0 
  file_picker: ^8.1.7
  fl_chart: ^0.71.0 # تحديث بسيط للثبات
  network_info_plus: ^6.0.1
  path_provider: ^2.1.5
  provider: ^6.0.5
  # التحديثات الجوهرية لفايربيز هنا:
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  # Clean Architecture Dependencies
  get_it: ^9.2.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  logger: ^2.0.2
  flutter_local_notifications: ^19.5.0  # Updated to fix bigLargeIcon compilation error
  flutter_screenutil: ^5.9.0
  image_picker: ^0.8.7+4
  intl: any
  path: ^1.9.0
  signalr_netcore: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^26.0.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
    - .env

dependency_overrides:
  vector_math: ^2.1.4 