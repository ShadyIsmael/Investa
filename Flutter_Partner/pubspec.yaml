name: flutter_partner
description: A professional Flutter investment partner platform with light/dark theme and multilingual support.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0" # رفعنا الـ SDK عشان يدعم النسخ الجديدة

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  google_fonts: ^4.0.3
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2 
  google_sign_in: ^6.2.1 
  # flutter_facebook_auth: ^6.0.4 # Temporarily disabled - macOS plugin issue
  flutter_signin_button: ^2.0.0
  http: ^1.6.0
  flutter_secure_storage: ^9.2.2 
  jwt_decoder: ^2.0.1
  dio: ^5.7.0 
  file_picker: ^8.1.7
  fl_chart: ^0.70.0 # تحديث بسيط للثبات
  network_info_plus: ^6.0.1
  path_provider: ^2.1.5
  provider: ^6.0.5
  # التحديثات الجوهرية لفايربيز هنا:
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  # Clean Architecture Dependencies
  get_it: ^7.6.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  logger: ^2.0.2
  flutter_local_notifications: ^19.5.0  # Updated to fix bigLargeIcon compilation error
  flutter_screenutil: ^5.9.0
  intl: ^0.19.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0
  get: ^4.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^22.7.4
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/

dependency_overrides:
  vector_math: ^2.1.4 