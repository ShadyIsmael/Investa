<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify Email</title>
</head>
<body>
  <div style="font-family: Arial, Helvetica, sans-serif; color: #111827;">
    <h2 style="margin: 0 0 12px;">Verify your email</h2>

    <p style="margin: 0 0 16px;">Hi {{UserName}},</p>

    <p style="margin: 0 0 16px;">
      Please verify your email address to continue. Click the button below:
    </p>

    <p style="margin: 0 0 16px;">
      <a href="{{VerificationUrl}}" style="display: inline-block; padding: 10px 16px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px;">
        Verify Email
      </a>
    </p>

    <p style="margin: 0; color: #6b7280; font-size: 12px;">{{CompanyName}}</p>
  </div>
</body>
</html>
