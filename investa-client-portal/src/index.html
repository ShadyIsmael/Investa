<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-t" />
  <title>Investa</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <!-- Google Fonts disabled for local build to avoid network font inlining issues -->
  <!-- <link rel="preconnect" href="https://fonts.googleapis.com"> -->
  <!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
  <!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"> -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@latest/css/flag-icons.min.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <!-- Google Maps JavaScript API with Places library -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA4ztts5AGByDwNkxmviihGmyX7wccfe3g&libraries=places"></script>
  <style>
    /*
      If your backend runs on a different host/port during development,
      override the runtime API base by adding this script above the app root
      (uncomment and edit as needed):

      <script>
        // Example: backend on port 5235
        // window.__INVESTA_API_BASE = 'http://desktop-dih7cqh:5235';
      </script>

      You can also set a server-inserted meta tag in the hosting HTML:
      <meta name='investa-api-base' content='http://desktop-dih7cqh:5235' />

      The client defaults to http://localhost:5000 as the API base. The
      runtime script below will ensure a meta tag value (if present) populates
      window.__INVESTA_API_BASE before the Angular app bootstraps.
    */

    body {
      font-family: 'Poppins', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.6s ease-out forwards;
      opacity: 0;
    }
    .favorite-btn.favorited svg {
      color: #ef4444; /* red-500 */
      animation: pop 0.4s ease-out;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    .line-clamp-3 {
       overflow: hidden;
       display: -webkit-box;
       -webkit-box-orient: vertical;
       -webkit-line-clamp: 3;
    }
    @keyframes subtle-glow {
      0% {
        opacity: 0.2;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.05);
      }
      100% {
        opacity: 0.2;
        transform: scale(1);
      }
    }
    .animate-subtle-glow {
      animation: subtle-glow 8s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    .animation-delay-4000 {
      animation-delay: 4s;
    }
    .delay-200 { animation-delay: 200ms; }
    .delay-400 { animation-delay: 400ms; }
    .delay-600 { animation-delay: 600ms; }
    .delay-800 { animation-delay: 800ms; }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100%);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    .animate-slide-in-right {
      animation: slideInRight 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }
    
    @keyframes progress-bar {
      from { width: 100%; }
      to { width: 0%; }
    }
    .animate-progress-bar {
      animation: progress-bar 5s linear forwards;
    }

    /* Hide scrollbar for clean timeline look */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "rxjs": "https://esm.sh/rxjs@^7.8.2?conditions=es2015",
    "rxjs/operators": "https://esm.sh/rxjs@^7.8.2/operators?conditions=es2015",
    "rxjs/ajax": "https://esm.sh/rxjs@^7.8.2/ajax?conditions=es2015",
    "rxjs/webSocket": "https://esm.sh/rxjs@^7.8.2/webSocket?conditions=es2015",
    "rxjs/testing": "https://esm.sh/rxjs@^7.8.2/testing?conditions=es2015",
    "rxjs/fetch": "https://esm.sh/rxjs@^7.8.2/fetch?conditions=es2015",
    "@angular/common": "https://esm.sh/@angular/common@^21.0.6?external=rxjs",
    "@angular/common/http": "https://esm.sh/@angular/common@^21.0.6/http?external=rxjs",
    "@angular/core": "https://esm.sh/@angular/core@^21.0.6?external=rxjs",
    "@angular/platform-browser": "https://esm.sh/@angular/platform-browser@^21.0.6?external=rxjs",
    "@angular/compiler": "https://esm.sh/v135/@angular/compiler@21.0.6/es2022/compiler.mjs",
    "@angular/router": "https://esm.sh/@angular/router@^21.0.6?external=rxjs",
    "@angular/forms": "https://esm.sh/@angular/forms@^21.0.6?external=rxjs",
    "@angular/core/rxjs-interop": "https://esm.sh/@angular/core@^21.0.6/rxjs-interop?external=rxjs",
    "lodash-es": "https://esm.sh/lodash-es@^4.17.22?external=rxjs"
  }
}
</script>
<!-- removed: /index.css (styles bundled by Angular) -->
</head>
<body class="bg-gray-950">
  <script>
    (function(){
      try {
        const meta = document.querySelector('meta[name="investa-api-base"]');
        const override = meta && meta.getAttribute('content');
        if (override) {
          window.__INVESTA_API_BASE = override;
          console.info('[Investa] API base overridden from meta:', override);
        }
      } catch (e) {
        // ignore
      }
    })();
  </script>

  <!-- Dev helper: force Arabic (RTL) when running on localhost so developers can visually test RTL layouts -->
  <script>
    try {
      // Only force Arabic in dev when no explicit language choice exists.
      // This avoids overwriting a developer or tester's saved preference.
      if ((location.hostname === 'localhost' || location.hostname === '127.0.0.1') && !localStorage.getItem('investa-lang')) {
        localStorage.setItem('investa-lang', 'ar');
        console.info('[Investa][Dev] forced language=ar for RTL checks (no saved preference)');
      }
    } catch (e) {
      // ignore
    }
  </script>


  <app-root></app-root>
</body>
</html>
