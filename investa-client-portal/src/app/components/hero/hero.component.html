<section class="hero-section">
  <app-header></app-header>

  <div class="hero-container">
    <div class="hero-grid">
      <div class="hero-content">
        <h1 class="hero-headline" [innerHTML]="highlightedTitle()"></h1>
        <p class="hero-subtitle">{{ subtitle() }}</p>
        <div class="hero-ctas">
          <a [routerLink]="primaryCtaUrl()" class="hero-btn-primary">
            <span>{{ primaryCtaLabel() }}</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="hero-btn-arrow"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
          <a [routerLink]="secondaryCtaUrl()" class="hero-btn-secondary">
            {{ secondaryCtaLabel() }}
          </a>
        </div>
      </div>

      <div class="hero-visual">
        <div class="hero-phones-wrap">
          <div class="hero-phones-glow"></div>
          <img src="assets/phone-mockup.svg" alt="Investa Mobile App" class="hero-phones-img" width="640" height="580">
        </div>
      </div>
    </div>
  </div>
</section>
