<section class="relative bg-gray-950 text-white pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
  <div class="absolute inset-0 bg-cover bg-center opacity-10" style="background-image: url('assets/boardroom-bg.jpg');"></div>
  <div class="absolute -top-1/4 -start-1/4 w-1/2 h-1/2 bg-blue-500/20 rounded-full filter blur-3xl animate-float"></div>
  <div class="absolute -bottom-1/4 -end-1/4 w-1/2 h-1/2 bg-purple-600/20 rounded-full filter blur-3xl animate-float animation-delay-4000"></div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="grid lg:grid-cols-2 gap-12 items-center">
      <div class="text-center lg:text-start">
        <h1 class="text-4xl md:text-5xl font-bold mb-6 tracking-tight animate-fade-in">
          <span class="block text-6xl md:text-8xl lg:text-9xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-2 animate-fade-in delay-200">
            {{ 'hero.title_part1' | translate }}
          </span>
          <span class="block text-3xl md:text-4xl text-gray-200 leading-snug animate-fade-in delay-400">
            {{ 'hero.title_part2' | translate }}
          </span>
        </h1>
        <p class="text-lg md:text-xl text-gray-300 max-w-xl mx-auto lg:mx-0 mb-10 animate-fade-in delay-600">
          {{ 'hero.description' | translate }}
        </p>
        <div class="flex flex-col sm:flex-row justify-center lg:justify-start items-center space-y-4 sm:space-y-0 sm:space-x-6 animate-fade-in delay-800">
          <a routerLink="/signup" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold py-3 px-8 rounded-full hover:opacity-90 transition-all duration-300 transform hover:scale-105">
            {{ 'hero.getStartedButton' | translate }}
          </a>
          <a href="#" class="border-2 border-gray-600 text-gray-300 font-semibold py-3 px-8 rounded-full hover:bg-gray-800 hover:border-gray-800 transition-all duration-300">
            {{ 'hero.watchDemoButton' | translate }}
          </a>
        </div>
      </div>
      <div class="hidden lg:flex justify-center animate-fade-in delay-400">
        <div class="relative mx-auto border-gray-800 bg-gray-800 border-[14px] rounded-[2.5rem] h-[600px] w-[300px] shadow-xl">
          <div class="w-[148px] h-[18px] bg-gray-800 top-0 rounded-b-[1rem] left-1/2 -translate-x-1/2 absolute"></div>
          <div class="h-[46px] w-[3px] bg-gray-800 absolute -start-[17px] top-[124px] rounded-s-lg"></div>
          <div class="h-[46px] w-[3px] bg-gray-800 absolute -start-[17px] top-[178px] rounded-s-lg"></div>
          <div class="h-[64px] w-[3px] bg-gray-800 absolute -end-[17px] top-[142px] rounded-e-lg"></div>
          <div class="rounded-[2rem] overflow-hidden w-[272px] h-[572px] bg-white dark:bg-gray-950">
              <img src="https://picsum.photos/seed/appscreen/300/600" class="w-full h-full object-cover" alt="App screen">
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
