<div class="bg-slate-800/50 border border-slate-700 rounded-xl p-8">
  <h2 class="text-3xl font-bold text-white mb-6">{{ 'contactPage.form.title' | translate }}</h2>
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label for="fullName" class="block text-sm font-medium text-gray-300">{{ 'contactPage.form.nameLabel' | translate }}</label>
      <input id="fullName" type="text" formControlName="fullName" [placeholder]="'contactPage.form.namePlaceholder' | translate" class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label for="email" class="block text-sm font-medium text-gray-300">{{ 'contactPage.form.emailLabel' | translate }}</label>
      <input id="email" type="email" formControlName="email" [placeholder]="'contactPage.form.emailPlaceholder' | translate" class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label for="subject" class="block text-sm font-medium text-gray-300">{{ 'contactPage.form.subjectLabel' | translate }}</label>
      <input id="subject" type="text" formControlName="subject" [placeholder]="'contactPage.form.subjectPlaceholder' | translate" class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label for="message" class="block text-sm font-medium text-gray-300">{{ 'contactPage.form.messageLabel' | translate }}</label>
      <textarea id="message" formControlName="message" rows="5" [placeholder]="'contactPage.form.messagePlaceholder' | translate" class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>

    <div>
      <button type="submit" [disabled]="!contactForm.valid" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm text-sm font-medium text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition-opacity duration-300">
        {{ 'contactPage.form.button' | translate }}
      </button>
    </div>
  </form>
</div>
