<section class="py-20 bg-gray-950">
  <div class="container mx-auto px-6">
    <div class="text-center mb-12 animate-fade-in">
      <h2 class="text-3xl md:text-4xl font-bold text-white">{{ 'blog.title' | translate }}</h2>
      <p class="text-lg text-gray-400 mt-4 max-w-2xl mx-auto">{{ 'blog.subtitle' | translate }}</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for(post of posts(); track post.titleKey; let i = $index) {
        <div class="bg-slate-900 rounded-lg overflow-hidden border border-slate-800 group animate-fade-in" [style.animation-delay]="150 * i + 'ms'">
          <a [routerLink]="['/blog', post.slug]" class="block">
            <img [src]="post.imageUrl" alt="{{ post.titleKey | translate }}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300">
          </a>
          <div class="p-6">
            <span class="text-sm font-semibold text-blue-400">{{ post.category }}</span>
            <h3 class="text-xl font-semibold text-white mt-2 mb-3">
              <a [routerLink]="['/blog', post.slug]" class="hover:text-blue-400 transition-colors duration-300">{{ post.titleKey | translate }}</a>
            </h3>
            <p class="text-gray-400 mb-4">{{ post.excerptKey | translate }}</p>
            <a [routerLink]="['/blog', post.slug]" class="font-semibold text-white group-hover:text-blue-400 transition-colors duration-300">
              {{ 'blog.readMore' | translate }} &rarr;
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</section>
