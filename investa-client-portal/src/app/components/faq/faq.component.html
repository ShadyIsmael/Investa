<section class="py-20 bg-gray-950">
  <div class="container mx-auto px-6 max-w-4xl">
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-white">{{ 'faq.title' | translate }}</h2>
      <p class="text-lg text-gray-400 mt-4">{{ 'faq.subtitle' | translate }}</p>
    </div>
    <div class="space-y-4">
      @for(faq of faqs(); track faq.questionKey; let i = $index) {
        <div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden">
          <button (click)="toggleFaq(i)" class="w-full flex justify-between items-center text-start p-6 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">
            <span class="font-semibold text-white text-lg">{{ faq.questionKey | translate }}</span>
            <svg class="w-6 h-6 text-gray-400 transition-transform duration-300 flex-shrink-0" [class.rotate-180]="faq.isOpen" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
          </button>
          @if(faq.isOpen) {
            <div class="px-6 pb-6 text-gray-300 animate-fade-in">
              <p [innerHTML]="faq.answerKey | translate"></p>
            </div>
          }
        </div>
      }
    </div>
  </div>
</section>
