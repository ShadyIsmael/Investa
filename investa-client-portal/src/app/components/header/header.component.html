<header class="sticky top-0 z-[1060] bg-slate-900/95 backdrop-blur-md border-b border-slate-700/50 py-4">
  <div class="container mx-auto px-6 flex justify-between items-center flex-nowrap">
    <!-- Logo -->
    <div class="flex items-center">
      <svg class="h-8 w-8 text-blue-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 16.75l-1.53 -1.22a2 2 0 0 0 -2.94 0l-3.53 2.82"></path>
        <path d="M14 16.75l-1.53 -1.22a2 2 0 0 1 2.94 0l3.53 2.82"></path>
        <path d="M10 14l2 -2l2 -2"></path>
        <path d="M12 12l3.5 -4.5l2.5 -2.5"></path>
        <path d="M12 12l-3.5 -4.5l-2.5 -2.5"></path>
     </svg>
      <span class="text-white text-2xl font-bold ms-2">Investa</span>
    </div>

    <!-- Navigation Links -->
    <nav class="flex items-center space-x-4 order-2 md:order-1 w-auto justify-start whitespace-nowrap overflow-x-auto">
      @for(link of navLinks(); track link.label) {
        <a [routerLink]="link.routerLink" [href]="link.href" class="text-gray-300 hover:text-white transition-colors duration-300 py-1 px-2 inline-block">{{ 'header.nav.' + link.label.toLowerCase() | translate }}</a>
      }
    </nav>
    
    <!-- Action Buttons (Language Toggle, Login, Signup) -->
    <div class="flex items-center space-x-4 order-3 md:order-2 w-auto justify-end mt-0">
      <a href="#" (click)="toggleLanguage($event)" class="text-gray-300 hover:text-white font-semibold py-2 px-4 transition-colors duration-300">
         {{ 'language.toggle' | translate }}
      </a>
      
      <a href="#" (click)="openLoginModal($event)" class="text-gray-300 hover:text-white font-semibold py-2 px-4 transition-colors duration-300">
        {{ 'header.login' | translate }}
      </a>

      <a routerLink="/signup" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold py-2 px-6 rounded-full hover:opacity-90 transition-opacity duration-300">
        {{ 'header.signup' | translate }}
      </a>
    </div>
  </div>
</header>
