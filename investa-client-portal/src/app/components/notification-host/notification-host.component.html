<div class="fixed top-6 end-6 z-[100] space-y-4 w-full max-w-sm">
  @for(toast of toasts(); track toast.id) {
    <div 
      class="relative w-full bg-slate-900 rounded-lg shadow-2xl pointer-events-auto overflow-hidden animate-slide-in-right border-s-4"
      [class]="{
        'border-green-500': toast.type === 'success',
        'border-blue-500': toast.type === 'info',
        'border-yellow-500': toast.type === 'warning',
        'border-red-500': toast.type === 'error'
      }"
      role="alert">

      <div class="p-4">
        <div class="flex items-start">
          <!-- Icon -->
          <div class="flex-shrink-0">
            @if(toast.type === 'success') {
              <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
                <svg class="h-6 w-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
            } @else if(toast.type === 'info') {
              <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
                <svg class="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
            } @else if(toast.type === 'warning') {
              <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
                <svg class="h-6 w-6 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" /></svg>
              </div>
            } @else if(toast.type === 'error') {
              <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
                <svg class="h-6 w-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
              </div>
            }
          </div>
          <!-- Text -->
          <div class="ms-4 w-0 flex-1">
            <p class="text-base font-semibold text-white">{{ toast.title }}</p>
            <p class="mt-1 text-sm text-gray-300">{{ toast.message }}</p>
          </div>
          <!-- Close Button -->
          <div class="ms-4 flex-shrink-0 flex">
            <button (click)="removeToast(toast.id)" type="button" class="inline-flex rounded-full p-1.5 text-gray-400 hover:text-white hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-white">
              <span class="sr-only">Close</span>
              <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" /></svg>
            </button>
          </div>
        </div>
      </div>
      
      <!-- Progress Bar -->
      <div 
        class="absolute bottom-0 start-0 h-1 animate-progress-bar"
        [class]="{
          'bg-green-500': toast.type === 'success',
          'bg-blue-500': toast.type === 'info',
          'bg-yellow-500': toast.type === 'warning',
          'bg-red-500': toast.type === 'error'
        }">
      </div>
    </div>
  }
</div>
