<footer class="bg-slate-900 text-gray-400">
  <div class="container mx-auto px-6 pt-16 pb-8">
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8">
      <div class="col-span-2 lg:col-span-1 mb-8 lg:mb-0">
        <div class="flex items-center mb-4">
          <svg class="h-8 w-8 text-blue-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 16.75l-1.53 -1.22a2 2 0 0 0 -2.94 0l-3.53 2.82"></path>
            <path d="M14 16.75l1.53 -1.22a2 2 0 0 1 2.94 0l3.53 2.82"></path>
            <path d="M10 14l2 -2l2 -2"></path>
            <path d="M12 12l3.5 -4.5l2.5 -2.5"></path>
            <path d="M12 12l-3.5 -4.5l-2.5 -2.5"></path>
         </svg>
          <span class="text-white text-2xl font-bold ms-2">Investa</span>
        </div>
        <p class="text-sm">{{ 'footer.tagline' | translate }}</p>
      </div>
      @for(group of linkGroups(); track group.title) {
        <div>
          <h3 class="text-white font-semibold mb-4 tracking-wider">{{ group.title | translate }}</h3>
          <ul class="space-y-3">
            @for(link of group.links; track link.key) {
              <li><a [routerLink]="link.routerLink" [href]="link.href" class="hover:text-white transition-colors duration-300">{{ link.key | translate }}</a></li>
            }
          </ul>
        </div>
      }
    </div>
    <div class="mt-12 border-t border-slate-800 pt-8 flex flex-col md:flex-row justify-between items-center text-sm">
      <p>&copy; {{ year }} {{ 'footer.copyright' | translate }}</p>
      <div class="flex space-x-4 mt-4 md:mt-0">
        <!-- Icons can be added here -->
        <a href="#" class="hover:text-white">X</a>
        <a href="#" class="hover:text-white">LinkedIn</a>
        <a href="#" class="hover:text-white">GitHub</a>
      </div>
    </div>
  </div>
</footer>
