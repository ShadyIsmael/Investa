<section class="py-20 bg-gray-900">
  <div class="container mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
      <div class="relative min-h-[450px]">
        <img src="https://picsum.photos/seed/com1/250/250" alt="Community member 1" class="relative rounded-lg shadow-2xl w-48 h-48 object-cover border-4 border-slate-700 z-10 transform -rotate-6 hover:rotate-0 hover:scale-110 transition-transform duration-300">
        <img src="https://picsum.photos/seed/com2/300/300" alt="Community member 2" class="absolute top-10 right-0 lg:right-10 rounded-lg shadow-2xl w-64 h-64 object-cover border-4 border-slate-700 z-20 transform rotate-3 hover:rotate-0 hover:scale-110 transition-transform duration-300">
        <img src="https://picsum.photos/seed/com3/200/200" alt="Community member 3" class="absolute bottom-0 left-1/4 rounded-lg shadow-2xl w-40 h-40 object-cover border-4 border-slate-700 z-30 transform rotate-2 hover:rotate-0 hover:scale-110 transition-transform duration-300">
        <div class="absolute inset-0 bg-gradient-to-r from-blue-600/20 to-purple-600/20 rounded-full filter blur-3xl -z-10"></div>
      </div>
      <div>
        <h2 class="text-3xl md:text-4xl font-bold text-white mb-6">{{ 'about.title' | translate }}</h2>
        <p class="text-gray-300 mb-8 text-lg">
          {{ 'about.description' | translate }}
        </p>
        <div class="space-y-6">
          @for(pillar of pillars(); track pillar.titleKey) {
            <div class="flex items-start gap-4">
              <div class="flex-shrink-0 w-12 h-12 bg-slate-800 rounded-lg flex items-center justify-center text-blue-400">
                <svg class="w-7 h-7" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="pillar.iconPath" />
                </svg>
              </div>
              <div>
                <h3 class="font-semibold text-white text-lg">{{ pillar.titleKey | translate }}</h3>
                <p class="text-gray-400">{{ pillar.descriptionKey | translate }}</p>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
