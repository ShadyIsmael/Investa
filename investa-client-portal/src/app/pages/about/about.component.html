<div class="relative overflow-x-hidden">
  <app-header></app-header>
  <main>
    <!-- Page Header -->
    <section class="relative bg-gray-950 text-white pt-32 pb-16 lg:pt-40 lg:pb-24 overflow-hidden">
      <div class="absolute inset-0 bg-cover bg-center opacity-10" style="background-image: url('assets/boardroom-bg.jpg');"></div>
      <div class="container mx-auto px-6 relative z-10 text-center animate-fade-in">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
          {{ 'about.title' | translate }}
        </h1>
        <p class="text-lg md:text-xl text-gray-300 max-w-3xl mx-auto">
          {{ 'about.description' | translate }}
        </p>
      </div>
    </section>

    <!-- Re-use the existing about component, it has more detailed pillar info -->
    <app-about></app-about>

    <!-- Social proof is great on an about page -->
    <app-testimonials></app-testimonials>

    <!-- Always have a call to action -->
    <app-cta></app-cta>
  </main>
  <app-footer></app-footer>
</div>
